# core.yaml - Algorithm-invariant problem definition
# Two Pointers: Pair with Target Sum

id: two-pointers-pair-with-target-sum
pattern: two-pointers
difficulty: easy
category: software-engineering
estimated_time: "15-25 minutes"

constraints:
  - "2 <= nums.length <= 100,000"
  - "-1,000,000,000 <= nums[i] <= 1,000,000,000"
  - "nums is sorted in non-decreasing order"
  - "-1,000,000,000 <= target <= 1,000,000,000"
  - "At most one valid pair exists in the array"

test_case_data:
  - id: "basic-example"
    input:
      nums: [1, 2, 3, 4, 6]
      target: 6
    expected: [2, 4]

  - id: "first-and-last"
    input:
      nums: [2, 5, 9, 11]
      target: 13
    expected: [2, 11]

  - id: "duplicate-values"
    input:
      nums: [1, 2, 4, 4]
      target: 8
    expected: [4, 4]

  - id: "no-pair-exists"
    input:
      nums: [1, 2, 3, 9]
      target: 8
    expected: null

  - id: "minimum-input"
    input:
      nums: [3, 7]
      target: 10
    expected: [3, 7]

  - id: "negative-numbers"
    input:
      nums: [-3, -1, 2, 6]
      target: 3
    expected: [-3, 6]

  - id: "large-values"
    input:
      nums: [1, 3, 5, 7, 9, 11]
      target: 20
    expected: [9, 11]

  - id: "zero-target"
    input:
      nums: [-5, -2, 0, 3, 5]
      target: 0
    expected: [-5, 5]

edge_cases:
  - case: "Two elements only"
    description: "Smallest possible array — only one pair to check"
    test_id: "minimum-input"

  - case: "No valid pair"
    description: "No two elements sum to target"
    test_id: "no-pair-exists"

  - case: "Duplicate values form the pair"
    description: "The same value appears twice and both are needed"
    test_id: "duplicate-values"

  - case: "Negative numbers"
    description: "Array contains negative values"
    test_id: "negative-numbers"

pattern_learning_objectives:
  - "Recognize that sorted input enables the Two Pointers approach"
  - "Understand how comparing the current sum to target determines which pointer to move"
  - "See why Two Pointers achieves O(n) instead of O(n²) brute force"
  - "Learn that moving left increases the sum and moving right decreases it"

real_world_applications:
  - "Finding complementary items in a sorted price catalog within a budget"
  - "Matching sensor readings that sum to a calibration target"
  - "Database query optimization for pair lookups on sorted indices"
  - "Load balancing — finding two servers whose combined capacity meets a requirement"

complexity_analysis:
  time:
    naive: "O(n²) - checking all pairs with nested loops"
    optimal: "O(n) - single pass with two pointers from opposite ends"
  space:
    optimal: "O(1) - only using two pointer variables"

pattern_signature:
  indicators:
    - "Sorted array"
    - "Find a pair with a specific sum"
    - "Need to optimize from O(n²) to O(n)"
    - "Can approach from both ends"

  pattern_name: "Two Pointers"

  when_to_use:
    - "Input is sorted (or can be sorted without affecting the answer)"
    - "Looking for a pair of elements with a specific relationship (sum, difference, product)"
    - "Want to eliminate impossible pairs efficiently"
    - "Can make decisions based on comparing current result to target"

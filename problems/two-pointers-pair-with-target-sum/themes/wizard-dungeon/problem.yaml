test_case_explanations:
  basic-example: "Five runestones, straightforward pair sums to 6"
  first-and-last: "The answer lies at the extremes of the satchel"
  duplicate-values: "Two identical runestones of power 4 combine for the charge"
  no-pair-exists: "No combination of two stones reaches the required charge"
  minimum-input: "Only two runestones -- check the single pair"
  negative-numbers: "Cursed runestones with negative power drain can still be useful"
  large-values: "Powerful runestones near the top of the satchel"
  zero-target: "The vault demands perfect balance: positive and negative must cancel"

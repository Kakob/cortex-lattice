# Complexity analysis
complexity:
  time:
    best_case: "O(1)"
    best_case_scenario: "The answer is at opposite ends (first comparison)"

    average_case: "O(n)"
    average_case_scenario: "Need to sweep roughly half the satchel"

    worst_case: "O(n)"
    worst_case_scenario: "No pair exists; pointers converge after n-1 iterations"

    explanation: |
      Each pointer moves at most n-1 times total. Left only moves right,
      right only moves left. Total operations: left_moves + right_moves <= n-1.
      Therefore: O(n) linear time complexity.

  space:
    value: "O(1)"
    explanation: "Only two pointer variables (left, right) and one temporary (current_sum)"
    note: "Constant space regardless of how many runestones you carry"

# Alternative approaches for comparison
alternative_solutions:
  - name: "Brute Force (Trial of Every Pairing)"
    approach: "Try all possible pairs of runestones"

    code_python: |
      def find_rune_pair_brute(nums, target):
          n = len(nums)
          for i in range(n):
              for j in range(i + 1, n):
                  if nums[i] + nums[j] == target:
                      return [nums[i], nums[j]]
          return None

    complexity:
      time: "O(n^2)"
      space: "O(1)"

    comparison_for_n10:
      brute_force_comparisons: 45
      two_pointers_comparisons: "~9"
      speedup: "5x faster"

    comparison_for_n1000:
      brute_force_comparisons: "~500,000"
      two_pointers_comparisons: "~1,000"
      speedup: "500x faster"

    when_to_use: "Never for this problem -- strictly worse than Two Pointers"
    teaching_value: "Shows WHY Two Pointers is an optimisation"

  - name: "Hash Map (The Enchanted Ledger)"
    approach: "Record each runestone's power in a ledger and check for complements"

    code_python: |
      def find_rune_pair_hash(nums, target):
          seen = {}
          for num in nums:
              complement = target - num
              if complement in seen:
                  return [complement, num]
              seen[num] = True
          return None

    complexity:
      time: "O(n)"
      space: "O(n)"

    tradeoff: "Same speed as Two Pointers but requires extra memory for the ledger"

    when_to_use: "When the runestones are NOT sorted (Two Pointers requires sorted input)"

    teaching_value: |
      Shows there are multiple O(n) solutions.
      Two Pointers is superior here because:
      1. The array is already sorted (given)
      2. Uses O(1) space instead of O(n) -- no enchanted ledger needed
      3. No risk of hash collisions

  - name: "Binary Search (Divination)"
    approach: "For each runestone, use binary search to divine its complement"

    code_python: |
      def find_rune_pair_binary(nums, target):
          import bisect
          for i in range(len(nums)):
              complement = target - nums[i]
              j = bisect.bisect_left(nums, complement, i + 1)
              if j < len(nums) and nums[j] == complement:
                  return [nums[i], nums[j]]
          return None

    complexity:
      time: "O(n log n)"
      space: "O(1)"

    comparison: "Slower than Two Pointers O(n), faster than Brute Force O(n^2)"

    when_to_use: "Rarely -- Two Pointers dominates this for sorted arrays"

    teaching_value: "Shows that binary search isn't always the best tool for sorted data"

# Approach explanation
approach_explanation:
  core_insight: |
    Two Pointers works because the array is sorted. This sorted order lets
    you make greedy decisions: if the combined power of your two chosen stones
    is too weak, the only useful move is to swap the weaker stone for a stronger
    one. If too strong, swap the stronger stone for a weaker one. You never
    need to revisit a discarded stone.

  why_it_works:
    - reason: "Sorted array enables directional reasoning"
      detail: |
        Because nums[left] <= nums[right] is guaranteed, we know exactly
        how pointer movements affect the sum:
        - Moving left right increases nums[left], increasing the sum
        - Moving right left decreases nums[right], decreasing the sum

    - reason: "Each move eliminates impossible pairs"
      detail: |
        When sum > target and we move right left:
        ALL pairs involving the old right value with any left value at or
        before the current left are too large. We skip them without checking.

    - reason: "Pointer convergence guarantees completeness"
      detail: |
        Starting at opposite ends and moving inward ensures every possible
        pair is either checked or provably eliminated. When the pointers
        meet, the search is exhaustive.

  step_by_step:
    - step: 1
      action: "Initialize left=0 (weakest runestone), right=n-1 (mightiest)"
      why: "Start with the widest possible pairing"

    - step: 2
      action: "Calculate sum = nums[left] + nums[right]"
      why: "Test the current pairing against the lock"

    - step: 3
      action: "Compare sum to target"
      cases:
        - "sum == target: The vault opens! Return the pair."
        - "sum < target: Too weak. Advance left to a stronger stone."
        - "sum > target: Too strong. Retreat right to a weaker stone."

    - step: 4
      action: "Repeat until left >= right"
      why: "When pointers meet, all pairs have been considered or eliminated"

  visual_metaphor: |
    Imagine your sorted runestones laid out in a line on the dungeon floor,
    weakest on the left, mightiest on the right. You place one hand on each
    end. If the combined glow is too dim (sum too small), slide your left hand
    rightward to a brighter stone. If too blinding (sum too large), slide your
    right hand leftward to a dimmer stone. Your hands converge toward the
    centre, and along the way you either find the perfect pair or prove that
    none exists.

# Edge cases
edge_case_handling:
  - case: "Only two runestones in the satchel"
    example: "nums = [3, 7], target = 10"
    handling: "Check the single pair. If it sums to target, return it; otherwise return None."
    iterations: 1

  - case: "No valid pair exists"
    example: "nums = [1, 2, 3, 9], target = 8"
    handling: "Pointers converge without finding a match. Return None."
    iterations: "~n"

  - case: "Duplicate runestones form the pair"
    example: "nums = [1, 2, 4, 4], target = 8"
    handling: "Two stones with identical power 4 occupy different sockets. left < right ensures they are distinct positions."
    note: "The condition left < right (not <=) guarantees two different stones."

  - case: "Cursed (negative) runestones"
    example: "nums = [-3, -1, 2, 6], target = 3"
    handling: "Works identically -- a negative stone reduces the combined power, but the pointer logic is unchanged."

  - case: "Zero target requiring positive and negative balance"
    example: "nums = [-5, -2, 0, 3, 5], target = 0"
    handling: "A cursed stone (-5) and a blessed stone (5) cancel out perfectly."

  - case: "Very large power values"
    example: "nums = [1, 3, 5, 7, 9, 11], target = 20"
    handling: "Works correctly with any integer range. No overflow in Python."
    note: "In languages with fixed-width integers, be mindful of overflow on addition."

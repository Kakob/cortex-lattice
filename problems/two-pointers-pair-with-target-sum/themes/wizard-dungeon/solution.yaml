id: two-pointers-pair-with-target-sum
pattern: two-pointers
difficulty: easy

# The reference implementation - optimal Two Pointers solution
# NOTE: For finding a SUM, pointers start at OPPOSITE ends
solution_code_python: |
  def find_rune_pair(nums, target):
      """
      Optimal Two Pointers solution for finding a pair with target sum.
      Time: O(n), Space: O(1)

      Key insight: Start from opposite ends of the sorted array.
      - If current sum < target, the weakest stone is too weak -> advance left
      - If current sum > target, the mightiest stone is too strong -> retreat right
      - If current sum == target, the vault opens!
      """
      left = 0
      right = len(nums) - 1

      while left < right:
          current_sum = nums[left] + nums[right]

          if current_sum == target:
              return [nums[left], nums[right]]
          elif current_sum < target:
              left += 1   # Need more power, pick a stronger left stone
          else:
              right -= 1  # Too much power, pick a weaker right stone

      return None  # No pair of runestones matches the lock

solution_code_javascript: |
  function findRunePair(nums, target) {
      /**
       * Optimal Two Pointers solution for finding a pair with target sum.
       * Time: O(n), Space: O(1)
       *
       * Key insight: Start from opposite ends of the sorted array.
       * - sum too small -> advance left pointer
       * - sum too large -> retreat right pointer
       */
      let left = 0;
      let right = nums.length - 1;

      while (left < right) {
          const currentSum = nums[left] + nums[right];

          if (currentSum === target) {
              return [nums[left], nums[right]];
          } else if (currentSum < target) {
              left++;   // Need more power
          } else {
              right--;  // Too much power
          }
      }

      return null;  // No matching pair
  }


# Complexity analysis
complexity:
  time:
    best_case: "O(1)"
    best_case_scenario: "Target pair happens to be the first and last elements"

    average_case: "O(n)"
    average_case_scenario: "Pointers converge partway through the formulary"

    worst_case: "O(n)"
    worst_case_scenario: "No valid pair exists; pointers converge after scanning all entries"

    explanation: |
      Each pointer moves at most n-1 times (left moves right, right moves left).
      Total operations: left_moves + right_moves <= n - 1
      Therefore: O(n) linear time complexity — like a single pass through the formulary.

  space:
    value: "O(1)"
    explanation: "Only two pointer variables (left, right) and one temp (current_sum)"
    note: "Constant space regardless of formulary size"

# Approach explanation
approach_explanation:
  core_insight: |
    Two Pointers works because the formulary is sorted by dosage strength.
    This ordering lets us make directional decisions: if the combined dose is
    too high, we know to try a lower top-end dosage; if too low, a higher
    bottom-end dosage. Each move eliminates an entire class of impossible
    combinations without examining them individually.

  why_it_works:
    - reason: "Sorted formulary enables directional titration"
      detail: |
        Because nums[left] <= nums[right] is guaranteed, we can predict
        how pointer movements affect the combined dose:
        - Moving left right  -> increases nums[left]  -> increases sum
        - Moving right left  -> decreases nums[right] -> decreases sum

    - reason: "Each adjustment eliminates impossible combinations"
      detail: |
        When sum > target and we move right left: ALL combinations using
        the current right-pointer dosage with any higher left-pointer
        dosage would also exceed the target. We skip them all at once.

    - reason: "Convergence guarantees exhaustive search"
      detail: |
        Starting at opposite ends and moving inward ensures we consider
        every viable combination exactly once before the pointers meet.

  step_by_step:
    - step: 1
      action: "Initialize left=0, right=n-1 (lowest and highest dosages)"
      why: "Start with the widest dosage spread in the formulary"

    - step: 2
      action: "Calculate current_sum = nums[left] + nums[right]"
      why: "See how the current combination compares to the therapeutic target"

    - step: 3
      action: "Compare current_sum to target"
      cases:
        - "current_sum == target: Exact match! Dispense this combination"
        - "current_sum > target: Supratherapeutic — reduce the higher dosage (right -= 1)"
        - "current_sum < target: Subtherapeutic — increase the lower dosage (left += 1)"

    - step: 4
      action: "Repeat until left >= right"
      why: "When pointers converge, all combinations have been evaluated"

  clinical_metaphor: |
    Think of it as titrating a combination regimen. You start with the
    lowest available dose of Drug A and the highest of Drug B. If the
    total is too high, you step down Drug B. If too low, you step up
    Drug A. This systematic titration is exactly how clinicians adjust
    combination therapies — and it is exactly the Two Pointers algorithm.

# Alternative approaches for comparison
alternative_solutions:
  - name: "Brute Force (Check All Combinations)"
    approach: "Try every possible two-drug combination from the formulary"

    code_python: |
      def find_dosage_pair_brute(nums, target):
          n = len(nums)
          for i in range(n):
              for j in range(i + 1, n):
                  if nums[i] + nums[j] == target:
                      return [nums[i], nums[j]]
          return None

    complexity:
      time: "O(n^2)"
      space: "O(1)"

    clinical_analogy: |
      Like manually checking every possible two-drug pairing in a
      large hospital formulary — impractical when the formulary has
      thousands of entries.

    when_to_use: "Only acceptable for very small formularies"
    teaching_value: "Shows WHY Two Pointers is an optimization over exhaustive search"

  - name: "Hash Map (Complement Lookup)"
    approach: "For each dosage, check if the complementary dosage exists using a hash map"

    code_python: |
      def find_dosage_pair_hash(nums, target):
          seen = {}
          for i, dose in enumerate(nums):
              complement = target - dose
              if complement in seen:
                  return [complement, dose]
              seen[dose] = i
          return None

    complexity:
      time: "O(n)"
      space: "O(n)"

    clinical_analogy: |
      Like building an index of all formulary entries first, then looking
      up the complement directly — fast, but requires extra memory for the
      index.

    tradeoff: "Same O(n) time as Two Pointers, but requires O(n) extra space"
    when_to_use: "When the formulary is NOT sorted (Two Pointers requires sorting)"
    teaching_value: |
      Demonstrates that multiple O(n) solutions exist. Two Pointers is
      preferred here because:
      1. The formulary is already sorted
      2. Uses O(1) space instead of O(n)
      3. No hash collision concerns

  - name: "Binary Search"
    approach: "For each dosage, binary search for its therapeutic complement"

    code_python: |
      def find_dosage_pair_binary(nums, target):
          for i in range(len(nums)):
              complement = target - nums[i]
              left, right = i + 1, len(nums) - 1
              while left <= right:
                  mid = (left + right) // 2
                  if nums[mid] == complement:
                      return [nums[i], nums[mid]]
                  elif nums[mid] < complement:
                      left = mid + 1
                  else:
                      right = mid - 1
          return None

    complexity:
      time: "O(n log n)"
      space: "O(1)"

    when_to_use: "Rarely — Two Pointers is strictly better for sorted input"
    teaching_value: "Illustrates that binary search is not always optimal for sorted data"

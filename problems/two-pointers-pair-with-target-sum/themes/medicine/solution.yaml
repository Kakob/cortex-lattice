# Clinical Medicine theme solution for Two Pointers - Pair with Target Sum

id: two-pointers-pair-with-target-sum-medicine
pattern: two-pointers
difficulty: easy

solution_code_python: |
  def find_dosage_pair(nums, target):
      """
      Optimal Two Pointers solution for finding a dosage combination.
      Time: O(n), Space: O(1)

      Key insight: Pointers start at opposite ends of the sorted formulary.
      - If the combined dose is too low, increase the lower dosage (move left right)
      - If the combined dose is too high, decrease the higher dosage (move right left)
      """
      left = 0
      right = len(nums) - 1

      while left < right:
          current_sum = nums[left] + nums[right]

          if current_sum == target:
              return [nums[left], nums[right]]
          elif current_sum < target:
              left += 1   # Combined dose too low, try a higher lower-bound dosage
          else:
              right -= 1  # Combined dose too high, try a lower upper-bound dosage

      return None  # No valid combination in the formulary

solution_code_javascript: |
  function findDosagePair(nums, target) {
      /**
       * Optimal Two Pointers solution for finding a dosage combination.
       * Time: O(n), Space: O(1)
       *
       * Key insight: Pointers start at opposite ends of the sorted formulary.
       * - If the combined dose is too low, increase the lower dosage (move left right)
       * - If the combined dose is too high, decrease the higher dosage (move right left)
       */
      let left = 0;
      let right = nums.length - 1;

      while (left < right) {
          const currentSum = nums[left] + nums[right];

          if (currentSum === target) {
              return [nums[left], nums[right]];
          } else if (currentSum < target) {
              left++;   // Combined dose too low, try higher lower-bound
          } else {
              right--;  // Combined dose too high, try lower upper-bound
          }
      }

      return null;  // No valid combination in the formulary
  }


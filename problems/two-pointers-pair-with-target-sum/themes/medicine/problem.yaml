# Clinical Medicine theme for Two Pointers - Pair with Target Sum

title: "Drug Combination Therapy Lookup"
function_name: find_dosage_pair

description: |
  You are a clinical pharmacist working with an electronic formulary system.
  A physician has ordered a combination therapy requiring two drugs whose
  dosages must sum to a precise therapeutic target (measured in mg).

  The hospital formulary lists available dosage strengths in ascending order.
  Your task is to identify two dosage values from the formulary that combine
  to reach the prescribed therapeutic target exactly.

  Given a sorted array of available dosage strengths (`nums`) and a
  therapeutic target (`target`), find two dosages that sum to the target.
  Return the pair as [dosage1, dosage2]. If no valid combination exists,
  return None — the physician must revise the order.

story_context: |
  In clinical practice, combination drug therapy is common: two agents with
  complementary mechanisms are co-administered to reach a total effective dose.
  The formulary only stocks certain dosage strengths, so the pharmacist must
  find a valid pair from what is available. Getting the total dose wrong risks
  therapeutic failure (underdosing) or adverse drug reactions (overdosing).

  This scenario mirrors real pharmaceutical workflows: formulary lookup,
  dose titration, and therapeutic drug monitoring all rely on searching
  sorted datasets efficiently.

examples:
  - input:
      nums: [1, 2, 3, 4, 6]
      target: 6
    output: [2, 4]
    explanation: |
      The formulary stocks strengths of 1 mg, 2 mg, 3 mg, 4 mg, and 6 mg.
      The therapeutic target is 6 mg total. Combining the 2 mg and 4 mg
      dosage forms yields exactly 6 mg (2 + 4 = 6).

  - input:
      nums: [2, 5, 9, 11]
      target: 13
    output: [2, 11]
    explanation: |
      Available strengths are 2, 5, 9, and 11 mg. The target is 13 mg.
      The 2 mg and 11 mg tablets combine to 13 mg (2 + 11 = 13).
      This pair uses the lowest and highest available strengths.

  - input:
      nums: [1, 2, 3, 9]
      target: 8
    output: null
    explanation: |
      No two dosage strengths in the formulary sum to 8 mg.
      The pharmacist must notify the prescriber that this exact
      combination cannot be filled from the current formulary.

hints:
  - level: 1
    text: |
      The formulary is sorted by dosage strength. Can you use that ordering
      to avoid checking every possible pair? Think about what happens when
      you combine the lowest and highest available doses.

  - level: 2
    text: |
      Start with two pointers: one at the lowest dosage and one at the
      highest. If their combined dose is too high, try a lower top dose.
      If too low, try a higher bottom dose.

  - level: 3
    text: |
      Initialize left=0 and right=len(nums)-1. Compute current_sum =
      nums[left] + nums[right]. If current_sum == target, return the pair.
      If current_sum < target, increment left. If current_sum > target,
      decrement right. Repeat until the pointers meet.


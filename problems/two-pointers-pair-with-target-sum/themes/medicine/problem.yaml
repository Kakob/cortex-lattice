test_case_explanations:
  basic-example: "Standard formulary lookup: 2 mg + 4 mg = 6 mg therapeutic target"
  first-and-last: "Combination uses the lowest and highest strengths in the formulary"
  duplicate-values: "Two identical dosage strengths (4 mg + 4 mg) meet the 8 mg target"
  no-pair-exists: "No valid combination exists; prescriber must revise the order"
  minimum-input: "Formulary has only two dosage options; the only possible pair"
  negative-numbers: "Negative values represent dose reductions (e.g., antagonist offsets); -3 + 6 = 3"
  large-values: "High-dose regimen: 9 mg + 11 mg = 20 mg total"
  zero-target: "Net-zero therapeutic effect: -5 mg antagonist + 5 mg agonist = 0"

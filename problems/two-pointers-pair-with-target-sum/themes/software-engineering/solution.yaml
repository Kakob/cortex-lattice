# The reference implementation - optimal Two Pointers solution
# NOTE: For finding a SUM, pointers start at opposite ends
solution_code_python: |
  def find_service_pair(nums, target):
      """
      Optimal Two Pointers solution for finding a pair with target sum.
      Time: O(n), Space: O(1)

      Key insight: Pointers start at opposite ends of the sorted array.
      - If current sum < target, move left pointer right to increase the sum
      - If current sum > target, move right pointer left to decrease the sum
      """
      left = 0
      right = len(nums) - 1

      while left < right:
          current_sum = nums[left] + nums[right]

          if current_sum == target:
              return [nums[left], nums[right]]
          elif current_sum < target:
              left += 1  # Need larger sum, increase the smaller value
          else:
              right -= 1  # Need smaller sum, decrease the larger value

      return None  # No valid pair found

solution_code_javascript: |
  function findServicePair(nums, target) {
      /**
       * Optimal Two Pointers solution for finding a pair with target sum.
       * Time: O(n), Space: O(1)
       *
       * Key insight: Pointers start at opposite ends of the sorted array.
       * - If current sum < target, move left pointer right to increase the sum
       * - If current sum > target, move right pointer left to decrease the sum
       */
      let left = 0;
      let right = nums.length - 1;

      while (left < right) {
          const currentSum = nums[left] + nums[right];

          if (currentSum === target) {
              return [nums[left], nums[right]];
          } else if (currentSum < target) {
              left++;  // Need larger sum, increase the smaller value
          } else {
              right--;  // Need smaller sum, decrease the larger value
          }
      }

      return null;  // No valid pair found
  }


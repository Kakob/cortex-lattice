# Complexity analysis
complexity:
  time:
    best_case: "O(1)"
    best_case_scenario: "Target pair at opposite ends (first comparison)"

    average_case: "O(n)"
    average_case_scenario: "Need to traverse roughly half the service manifest"

    worst_case: "O(n)"
    worst_case_scenario: "No pair exists, pointers converge after n iterations"

    explanation: |
      Each pointer moves at most n times (left moves right, right moves left).
      Total operations: left_moves + right_moves <= n
      Therefore: O(n) linear time complexity

  space:
    value: "O(1)"
    explanation: "Only using two pointer variables (left, right) and one temp (current_sum)"
    note: "Constant space regardless of fleet size"

# Alternative approaches for comparison
alternative_solutions:
  - name: "Brute Force (Nested Loops)"
    approach: "Check all possible service pairs with nested loops"

    code_python: |
      def find_service_pair_brute(nums, target):
          n = len(nums)
          for i in range(n):
              for j in range(i + 1, n):
                  if nums[i] + nums[j] == target:
                      return [nums[i], nums[j]]
          return None

    complexity:
      time: "O(n^2)"
      space: "O(1)"

    comparison_for_n10:
      brute_force_comparisons: 45
      two_pointers_comparisons: "~9"
      speedup: "5x faster"

    comparison_for_n1000:
      brute_force_comparisons: "~500,000"
      two_pointers_comparisons: "~1,000"
      speedup: "500x faster"

    when_to_use: "Never for this problem — strictly worse than Two Pointers"
    teaching_value: "Shows WHY Two Pointers is an optimization"

  - name: "Hash Map"
    approach: "Use hash map to check if target complement exists"

    code_python: |
      def find_service_pair_hash(nums, target):
          seen = {}
          for i, val in enumerate(nums):
              complement = target - val
              if complement in seen:
                  return [complement, val]
              seen[val] = i
          return None

    complexity:
      time: "O(n)"
      space: "O(n)"

    tradeoff: "Same time as Two Pointers but uses O(n) extra space"

    when_to_use: "When the service manifest is NOT sorted"

    teaching_value: |
      Shows there are multiple O(n) solutions.
      Two Pointers is better here because:
      1. The manifest is already sorted (given)
      2. Uses O(1) space instead of O(n)
      3. No hash collisions possible
      4. More cache-friendly memory access pattern

  - name: "Binary Search"
    approach: "For each service, binary search for the complement"

    code_python: |
      def find_service_pair_binary(nums, target):
          for i in range(len(nums)):
              complement = target - nums[i]
              left, right = i + 1, len(nums) - 1
              while left <= right:
                  mid = (left + right) // 2
                  if nums[mid] == complement:
                      return [nums[i], nums[mid]]
                  elif nums[mid] < complement:
                      left = mid + 1
                  else:
                      right = mid - 1
          return None

    complexity:
      time: "O(n log n)"
      space: "O(1)"

    comparison: "Slower than Two Pointers O(n), faster than Brute Force O(n^2)"

    when_to_use: "Rarely — Two Pointers dominates for sorted arrays"

    teaching_value: "Shows that binary search isn't always optimal even for sorted input"

# Approach explanation
approach_explanation:
  core_insight: |
    Two Pointers works because the service manifest is sorted. This sorted
    property allows us to make greedy decisions — adjusting one pointer at a
    time — that eliminate impossible pairings without evaluating them.

  why_it_works:
    - reason: "Sorted array enables directional reasoning"
      detail: |
        Because nums[left] <= nums[right] is guaranteed,
        we know exactly how pointer movements affect the sum:
        - Moving left right increases nums[left] and increases the sum
        - Moving right left decreases nums[right] and decreases the sum

    - reason: "Each move eliminates a set of impossible pairs"
      detail: |
        When sum > target and we move right left:
        ALL pairs involving the old right value with any left value
        at or below the current left are too large. We skip them all.

    - reason: "Pointer convergence guarantees completeness"
      detail: |
        Starting at opposite ends and moving inward ensures
        we consider all relevant pairs exactly once.

  step_by_step:
    - step: 1
      action: "Initialize left=0, right=n-1"
      why: "Start with the widest bracket — lowest and highest utilization services"

    - step: 2
      action: "Calculate sum = nums[left] + nums[right]"
      why: "Evaluate whether this pair of services meets the target capacity"

    - step: 3
      action: "Compare sum to target"
      cases:
        - "sum == target: Found a valid pairing! Return it"
        - "sum > target: Over capacity — move right left to use a lower-utilization service"
        - "sum < target: Under capacity — move left right to use a higher-utilization service"

    - step: 4
      action: "Repeat until left >= right"
      why: "When pointers meet, all pairings have been evaluated"

  visual_metaphor: |
    Think of it as a load balancer scanning a sorted rack of servers.
    You start by pairing the most-idle server with the busiest server.
    If that overshoots the capacity target, swap in a less-busy server
    from the high end. If it undershoots, swap in a busier server from
    the low end. You converge on the right pairing in linear time.

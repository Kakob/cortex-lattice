test_case_explanations:
  basic-example: "Two mid-range services pair to fill a host node"
  first-and-last: "Lowest and highest utilization services pair up"
  duplicate-values: "Two services with identical utilization both needed"
  no-pair-exists: "No valid co-location pairing exists for this capacity"
  minimum-input: "Only two services in the fleet — one pair to check"
  negative-numbers: "Services with negative scores (cooling/idle credits) included"
  large-values: "High-utilization services near the top of the manifest"

# Complexity analysis
complexity:
  time:
    best_case: "O(1)"
    best_case_scenario: "The cheapest and most expensive assets match on the first check"

    average_case: "O(n)"
    average_case_scenario: "Pointers converge toward the middle of the watchlist"

    worst_case: "O(n)"
    worst_case_scenario: "No valid pair exists -- pointers scan the entire list"

    explanation: |
      Each pointer moves at most n positions total. Left only moves right,
      right only moves left. Combined movements <= n, so total work is O(n).
      Compared to checking all n*(n-1)/2 pairs with brute force, this is a
      massive speedup for large watchlists.

  space:
    value: "O(1)"
    explanation: "Only two pointer variables (left, right) and one temp (current_sum)"
    note: "Constant space regardless of watchlist size -- no auxiliary data structures"

# Approach explanation for teaching
approach_explanation:
  core_insight: |
    Two Pointers works because the watchlist is sorted by price. This sorted
    property lets you make a greedy decision at each step: if the combined
    cost is too high, you know every pair involving the current expensive
    asset will also be too high -- so you can dismiss that entire asset and
    move to a cheaper one. Conversely, if the cost is too low, every pair
    involving the current cheap asset is also too low, so you move to a
    pricier one. Each decision eliminates an entire row or column of the
    pair matrix without checking it.

  why_it_works:
    - reason: "Sorted prices enable directional reasoning"
      detail: |
        Because nums[left] <= nums[right] is guaranteed by sorting, we know:
        - Moving left right increases nums[left], increasing the sum
        - Moving right left decreases nums[right], decreasing the sum
        This gives us a deterministic steering mechanism.

    - reason: "Each move eliminates a set of impossible pairs"
      detail: |
        When sum > target and we move right left: ALL pairs involving
        the old right value are over budget (since every left value >=
        current left value would produce an even larger sum). We skip
        them without checking.

    - reason: "Convergence guarantees completeness"
      detail: |
        Starting at opposite ends and moving inward ensures every
        candidate pair is either checked or provably eliminated.
        When left >= right, the search is exhaustive.

  step_by_step:
    - step: 1
      action: "Initialize left = 0, right = n - 1"
      why: "Start with the cheapest and most expensive assets -- the widest bracket"

    - step: 2
      action: "Calculate sum = nums[left] + nums[right]"
      why: "Check whether the current pair fills the budget"

    - step: 3
      action: "Compare sum to target"
      cases:
        - "sum == target: Budget matched -- deploy both positions and return"
        - "sum < target: Under budget -- move left right to get a pricier asset"
        - "sum > target: Over budget -- move right left to get a cheaper asset"

    - step: 4
      action: "Repeat until left >= right"
      why: "When pointers meet, all pairs have been considered or eliminated"

  visual_metaphor: |
    Imagine standing in front of a trading screen with assets sorted by price
    from left to right. You put one finger on the cheapest ticker and one on
    the most expensive. You check their combined cost against your budget.
    Too expensive? Slide your right finger one ticker to the left. Too cheap?
    Slide your left finger one ticker to the right. You keep squeezing until
    you land on a perfect pair -- or your fingers meet, meaning no pair exists.

# Alternative approaches for comparison
alternative_solutions:
  - name: "Brute Force (Nested Loops)"
    approach: "Check all possible pairs of assets in the watchlist"

    code_python: |
      def find_allocation_pair_brute(nums, target):
          n = len(nums)
          for i in range(n):
              for j in range(i + 1, n):
                  if nums[i] + nums[j] == target:
                      return [nums[i], nums[j]]
          return None

    complexity:
      time: "O(n^2)"
      space: "O(1)"

    comparison_for_n10:
      brute_force_comparisons: 45
      two_pointers_comparisons: "~9"
      speedup: "5x faster"

    comparison_for_n1000:
      brute_force_comparisons: "~500,000"
      two_pointers_comparisons: "~1,000"
      speedup: "500x faster"

    when_to_use: "Never for sorted data -- strictly dominated by Two Pointers"
    teaching_value: "Shows WHY Two Pointers is an optimization over the naive approach"

  - name: "Hash Map"
    approach: "For each price, check if the complement (target - price) was already seen"

    code_python: |
      def find_allocation_pair_hash(nums, target):
          seen = {}
          for price in nums:
              complement = target - price
              if complement in seen:
                  return [complement, price]
              seen[price] = True
          return None

    complexity:
      time: "O(n)"
      space: "O(n)"

    tradeoff: "Same O(n) time as Two Pointers but uses O(n) extra memory for the hash map"

    when_to_use: "When the watchlist is NOT sorted (Two Pointers requires sorted data)"

    teaching_value: |
      Shows there are multiple O(n) solutions. Two Pointers is better here because:
      1. The watchlist is already sorted (given)
      2. Uses O(1) space instead of O(n)
      3. No hash collisions or memory overhead
      In trading systems, lower memory footprint means less GC pressure and
      more predictable latency.

  - name: "Binary Search"
    approach: "For each asset, binary search for the complement price"

    code_python: |
      def find_allocation_pair_binary(nums, target):
          for i in range(len(nums)):
              complement = target - nums[i]
              lo, hi = i + 1, len(nums) - 1
              while lo <= hi:
                  mid = (lo + hi) // 2
                  if nums[mid] == complement:
                      return [nums[i], nums[mid]]
                  elif nums[mid] < complement:
                      lo = mid + 1
                  else:
                      hi = mid - 1
          return None

    complexity:
      time: "O(n log n)"
      space: "O(1)"

    comparison: "Slower than Two Pointers O(n), faster than Brute Force O(n^2)"

    when_to_use: "Rarely -- Two Pointers dominates this for sorted arrays"

    teaching_value: "Demonstrates that binary search is not always optimal even on sorted data"

# Edge case handling
edge_case_handling:
  - case: "Array with only 2 elements"
    example: "nums = [3, 7], target = 10"
    handling: "Check the single pair, return immediately"
    iterations: 1

  - case: "No valid pair exists"
    example: "nums = [1, 2, 3, 9], target = 8"
    handling: "Pointers converge without finding a match, return None"
    iterations: "~n"

  - case: "Duplicate values form the pair"
    example: "nums = [1, 2, 4, 4], target = 8"
    handling: "Both pointers land on different indices with the same value"
    note: "left < right ensures they reference different positions even with equal prices"

  - case: "Negative numbers (short positions)"
    example: "nums = [-3, -1, 2, 6], target = 3"
    handling: "Works identically -- sorted property holds for negative values"
    note: "Short positions are represented as negative prices"

  - case: "Target is zero (market-neutral hedge)"
    example: "nums = [-5, -2, 0, 3, 5], target = 0"
    handling: "Find a short and long position that cancel out"
    note: "Common in hedging strategies"

  - case: "Large values near constraint limits"
    example: "nums = [1, 3, 5, 7, 9, 11], target = 20"
    handling: "Works correctly -- addition stays within integer bounds"
    note: "No overflow in Python; in JavaScript, safe up to 2^53"

# Finance & Trading theme solution
# Two Pointers: Pair with Target Sum

id: two-pointers-pair-with-target-sum-finance
pattern: two-pointers
difficulty: easy

# The reference implementation - optimal Two Pointers solution
# NOTE: For finding a SUM, pointers start from opposite ends
solution_code_python: |
  def find_allocation_pair(nums, target):
      """
      Optimal Two Pointers solution for finding a pair with target sum.
      Time: O(n), Space: O(1)

      Key insight: Pointers start at opposite ends of the sorted watchlist.
      - If combined cost < budget, move left pointer right (need pricier asset)
      - If combined cost > budget, move right pointer left (need cheaper asset)
      """
      left = 0
      right = len(nums) - 1

      while left < right:
          current_sum = nums[left] + nums[right]

          if current_sum == target:
              return [nums[left], nums[right]]
          elif current_sum < target:
              left += 1   # Under budget -- pick a more expensive asset
          else:
              right -= 1  # Over budget -- pick a cheaper asset

      return None  # No valid pair -- capital stays undeployed

solution_code_javascript: |
  function findAllocationPair(nums, target) {
      /**
       * Optimal Two Pointers solution for finding a pair with target sum.
       * Time: O(n), Space: O(1)
       *
       * Key insight: Pointers start at opposite ends of the sorted watchlist.
       * - If combined cost < budget, move left pointer right (need pricier asset)
       * - If combined cost > budget, move right pointer left (need cheaper asset)
       */
      let left = 0;
      let right = nums.length - 1;

      while (left < right) {
          const currentSum = nums[left] + nums[right];

          if (currentSum === target) {
              return [nums[left], nums[right]];
          } else if (currentSum < target) {
              left++;   // Under budget -- pick a more expensive asset
          } else {
              right--;  // Over budget -- pick a cheaper asset
          }
      }

      return null;  // No valid pair -- capital stays undeployed
  }


test_case_explanations:
  multiple-triplets: "Seven components yield four distinct null-field wards"
  single-triplet: "Only one valid combination -- the strongest negative balanced by two positives"
  all-zeros: "Three neutral components form a trivially balanced ward"
  no-triplet: "All positive charges -- impossible to achieve zero sum"
  classic-example: "The classic 3Sum example with duplicates requiring careful skip logic"
  duplicate-elements: "Repeated zeros and twos -- only one unique ward despite multiple copies"
  extra-zeros: "Four neutral components but only one ward [0,0,0] -- duplicate skipping essential"
  repeated-negative: "Three identical negative components but only one valid triplet using two of them"

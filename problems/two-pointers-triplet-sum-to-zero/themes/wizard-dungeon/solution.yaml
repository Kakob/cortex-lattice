id: two-pointers-triplet-sum-to-zero
pattern: two-pointers
difficulty: medium

# The reference implementation - optimal Two Pointers solution
# Key: Sort first, fix one element, run Two Pointers on the remainder
solution_code_python: |
  def find_null_wards(nums):
      """
      Optimal Two Pointers solution for finding all unique triplets summing to zero.
      Time: O(n^2), Space: O(n) for sorting

      Strategy: Sort the components. For each anchor component, use Two Pointers
      on the remaining subarray to find pairs summing to the anchor's negation.
      Skip duplicates at both the outer and inner levels.
      """
      nums.sort()
      triplets = []

      for i in range(len(nums) - 2):
          # Skip duplicate anchors
          if i > 0 and nums[i] == nums[i - 1]:
              continue

          # Early termination: if anchor is positive, no triplet can sum to 0
          if nums[i] > 0:
              break

          left = i + 1
          right = len(nums) - 1

          while left < right:
              current_sum = nums[i] + nums[left] + nums[right]

              if current_sum == 0:
                  triplets.append([nums[i], nums[left], nums[right]])

                  # Skip duplicate left values
                  while left < right and nums[left] == nums[left + 1]:
                      left += 1
                  # Skip duplicate right values
                  while left < right and nums[right] == nums[right - 1]:
                      right -= 1

                  left += 1
                  right -= 1
              elif current_sum < 0:
                  left += 1   # Need larger sum -- advance to stronger charge
              else:
                  right -= 1  # Need smaller sum -- retreat to weaker charge

      return triplets

solution_code_javascript: |
  function findNullWards(nums) {
      /**
       * Optimal Two Pointers solution for finding all unique triplets summing to zero.
       * Time: O(n^2), Space: O(n) for sorting
       *
       * Strategy: Sort the components. For each anchor, use Two Pointers on the
       * remaining subarray. Skip duplicates at both levels.
       */
      nums.sort((a, b) => a - b);
      const triplets = [];

      for (let i = 0; i < nums.length - 2; i++) {
          // Skip duplicate anchors
          if (i > 0 && nums[i] === nums[i - 1]) continue;

          // Early termination: if anchor is positive, no triplet can sum to 0
          if (nums[i] > 0) break;

          let left = i + 1;
          let right = nums.length - 1;

          while (left < right) {
              const currentSum = nums[i] + nums[left] + nums[right];

              if (currentSum === 0) {
                  triplets.push([nums[i], nums[left], nums[right]]);

                  // Skip duplicate left values
                  while (left < right && nums[left] === nums[left + 1]) left++;
                  // Skip duplicate right values
                  while (left < right && nums[right] === nums[right - 1]) right--;

                  left++;
                  right--;
              } else if (currentSum < 0) {
                  left++;   // Need larger sum
              } else {
                  right--;  // Need smaller sum
              }
          }
      }

      return triplets;
  }

# Expected execution trace for primary example
reference_trace:
  input:
    nums: [-3, 0, 1, 2, -1, 1, -2]

  steps:
    - step: 0
      action: "Sort the spell components by charge"
      state:
        nums_before: [-3, 0, 1, 2, -1, 1, -2]
        nums_after: [-3, -2, -1, 0, 1, 1, 2]
      explanation: "Arrange components from most negative to most positive charge"

    - step: 1
      action: "Fix anchor at i=0, nums[0]=-3"
      state:
        anchor: -3
        target_pair_sum: 3
        left: 1
        right: 6
      explanation: "Need two components summing to 3 to cancel the -3 anchor"

    - step: 2
      action: "Inner Two Pointers: nums[-2] + nums[2] = -2 + 2 = 0, total = -3 + 0 = -3"
      state:
        current_sum: -3
      comparison: "-3 < 0 -- sum too low, advance left"

    - step: 3
      action: "left advances to index 2 (value -1), sum = -3 + (-1) + 2 = -2"
      state:
        current_sum: -2
      comparison: "-2 < 0 -- still too low, advance left"

    - step: 4
      action: "left advances to index 3 (value 0), sum = -3 + 0 + 2 = -1"
      state:
        current_sum: -1
      comparison: "-1 < 0 -- still too low, advance left"

    - step: 5
      action: "left advances to index 4 (value 1), sum = -3 + 1 + 2 = 0"
      state:
        current_sum: 0
      comparison: "0 == 0 -- MATCH! Record triplet [-3, 1, 2]"
      triplets_so_far: [[-3, 1, 2]]

    - step: 6
      action: "Skip duplicate left (nums[4]=1 == nums[5]=1), advance left to 5, then left=6, right=5"
      state:
        left: 6
        right: 5
      explanation: "Pointers crossed -- done with anchor -3"

    - step: 7
      action: "Fix anchor at i=1, nums[1]=-2"
      state:
        anchor: -2
        target_pair_sum: 2
        left: 2
        right: 6
      explanation: "Need two components summing to 2 to cancel the -2 anchor"

    - step: 8
      action: "sum = -2 + (-1) + 2 = -1"
      comparison: "-1 < 0 -- advance left"

    - step: 9
      action: "left=3 (value 0), sum = -2 + 0 + 2 = 0"
      comparison: "0 == 0 -- MATCH! Record triplet [-2, 0, 2]"
      triplets_so_far: [[-3, 1, 2], [-2, 0, 2]]

    - step: 10
      action: "Skip duplicates, advance left to 4, retreat right to 5. sum = -2 + 1 + 1 = 0"
      comparison: "0 == 0 -- MATCH! Record triplet [-2, 1, 1]"
      triplets_so_far: [[-3, 1, 2], [-2, 0, 2], [-2, 1, 1]]

    - step: 11
      action: "Pointers cross after duplicate skip -- done with anchor -2"

    - step: 12
      action: "Fix anchor at i=2, nums[2]=-1"
      state:
        anchor: -1
        target_pair_sum: 1
        left: 3
        right: 6

    - step: 13
      action: "sum = -1 + 0 + 2 = 1"
      comparison: "1 > 0 -- retreat right"

    - step: 14
      action: "right=5 (value 1), sum = -1 + 0 + 1 = 0"
      comparison: "0 == 0 -- MATCH! Record triplet [-1, 0, 1]"
      triplets_so_far: [[-3, 1, 2], [-2, 0, 2], [-2, 1, 1], [-1, 0, 1]]

    - step: 15
      action: "Pointers cross -- done with anchor -1"

    - step: 16
      action: "Fix anchor at i=3, nums[3]=0. Since 0 is not > 0, continue."
      state:
        left: 4
        right: 6
      explanation: "sum = 0 + 1 + 2 = 3 > 0, retreat right. right=5, sum = 0 + 1 + 1 = 2 > 0, retreat right. Pointers cross."

    - step: 17
      action: "i=4, nums[4]=1 > 0 -- early termination. Break outer loop."
      explanation: "All remaining anchors are positive; no more triplets possible."

  summary:
    total_outer_iterations: 5
    total_triplets_found: 4
    result: [[-3, 1, 2], [-2, 0, 2], [-2, 1, 1], [-1, 0, 1]]
    efficiency: "O(n^2) -- quadratic, but optimal for this problem"

# Additional traces for edge cases
additional_traces:

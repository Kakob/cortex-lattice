id: two-pointers-squaring-a-sorted-array-wizard
pattern: two-pointers
difficulty: easy

# The reference implementation - optimal Two Pointers solution
# NOTE: For squaring a sorted array, pointers start at OPPOSITE ends
#       and we fill the result array from the END (largest position) backward
solution_code_python: |
  def square_enchantments(nums):
      """
      Optimal Two Pointers solution for squaring a sorted array.
      Time: O(n), Space: O(n) for the result array

      Key insight: The largest squared value comes from whichever end
      of the sorted rack has the greater absolute power. Fill the
      result from right to left (largest to smallest).
      """
      n = len(nums)
      result = [0] * n
      left = 0
      right = n - 1
      pos = n - 1  # Fill from the end

      while left <= right:
          left_sq = nums[left] * nums[left]
          right_sq = nums[right] * nums[right]

          if left_sq > right_sq:
              result[pos] = left_sq
              left += 1    # This cursed rune had more power, move inward
          else:
              result[pos] = right_sq
              right -= 1   # This blessed rune had more power, move inward

          pos -= 1

      return result

solution_code_javascript: |
  function squareEnchantments(nums) {
      /**
       * Optimal Two Pointers solution for squaring a sorted array.
       * Time: O(n), Space: O(n) for the result array
       *
       * Key insight: The largest squared value comes from whichever end
       * of the sorted rack has the greater absolute power. Fill the
       * result from right to left (largest to smallest).
       */
      const n = nums.length;
      const result = new Array(n);
      let left = 0;
      let right = n - 1;
      let pos = n - 1;  // Fill from the end

      while (left <= right) {
          const leftSq = nums[left] * nums[left];
          const rightSq = nums[right] * nums[right];

          if (leftSq > rightSq) {
              result[pos] = leftSq;
              left++;    // This cursed rune had more power, move inward
          } else {
              result[pos] = rightSq;
              right--;   // This blessed rune had more power, move inward
          }

          pos--;
      }

      return result;
  }


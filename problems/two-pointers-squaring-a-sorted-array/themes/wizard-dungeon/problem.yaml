test_case_explanations:
  mixed-negatives-and-positives: "A mix of cursed and blessed runes -- squaring scrambles the order"
  mixed-with-symmetric-values: "Runes of power -1 and 1 produce identical squares"
  all-positive: "All blessed runes -- squares are already in order"
  all-negative: "All cursed runes -- squaring reverses the order completely"
  two-elements-mirror: "One cursed and one blessed rune of equal magnitude"
  single-zero: "A single neutral rune -- trivially pass the chamber"
  zeros-and-mixed: "Zeros produce the smallest squares; large magnitudes at the ends dominate"
  mixed-with-large-spread: "Wide spread of powers tests that the algorithm handles big and small squares correctly"

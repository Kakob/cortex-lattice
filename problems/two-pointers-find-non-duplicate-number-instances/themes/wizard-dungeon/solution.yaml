id: two-pointers-find-non-duplicate-number-instances-wizard
pattern: two-pointers
difficulty: easy

# The reference implementation - optimal Two Pointers solution
# NOTE: For deduplication, both pointers start from the left and move right
solution_code_python: |
  def remove_duplicate_spells(nums):
      """
      Optimal Two Pointers solution for removing duplicates in-place.
      Time: O(n), Space: O(1)

      Key insight: Use a slow pointer (inking quill) to track the write
      position for unique spells, and a fast pointer (reading quill) to
      scan every entry. When the reading quill finds a new spell, copy
      it to the inking quill's position and advance.
      """
      if len(nums) == 0:
          return 0

      slow = 0  # Inking quill — last unique spell position

      for fast in range(1, len(nums)):
          if nums[fast] != nums[slow]:
              slow += 1
              nums[slow] = nums[fast]

      return slow + 1  # Count of unique spells

solution_code_javascript: |
  function removeDuplicateSpells(nums) {
      /**
       * Optimal Two Pointers solution for removing duplicates in-place.
       * Time: O(n), Space: O(1)
       *
       * Key insight: slow pointer tracks write position for unique values,
       * fast pointer scans every element.
       */
      if (nums.length === 0) return 0;

      let slow = 0;  // Inking quill — last unique spell position

      for (let fast = 1; fast < nums.length; fast++) {
          if (nums[fast] !== nums[slow]) {
              slow++;
              nums[slow] = nums[fast];
          }
      }

      return slow + 1;  // Count of unique spells
  }


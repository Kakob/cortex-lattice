# Complexity analysis
complexity:
  time:
    best_case: "O(n)"
    best_case_scenario: "All elements are identical — fast scans all, slow never moves"

    average_case: "O(n)"
    average_case_scenario: "Mix of duplicates — fast always scans all n elements"

    worst_case: "O(n)"
    worst_case_scenario: "All elements unique — fast scans and slow advances on every step"

    explanation: |
      The fast pointer always visits every element exactly once (n-1 iterations).
      The slow pointer advances at most n-1 times. Each iteration does O(1) work
      (one comparison and possibly one copy). Total: O(n).

  space:
    value: "O(1)"
    explanation: "Only two pointer variables (slow, fast). The array is modified in-place."
    note: "No auxiliary data structures — constant space regardless of scroll length."

# Alternative approaches for comparison
alternative_solutions:
  - name: "Hash Set (The Enchanted Ledger)"
    approach: "Use a set to track seen spells, then rebuild the array from the set"

    code_python: |
      def remove_duplicate_spells_set(nums):
          seen = set()
          write = 0
          for val in nums:
              if val not in seen:
                  seen.add(val)
                  nums[write] = val
                  write += 1
          return write

    complexity:
      time: "O(n)"
      space: "O(n)"

    tradeoff: "Same time but uses O(n) extra space for the set"

    when_to_use: "When the array is NOT sorted — the set handles arbitrary order"

    teaching_value: |
      Shows that sorted input makes the set unnecessary. Because duplicates
      are adjacent in a sorted array, a simple comparison with the previous
      unique value replaces the entire hash set.

  - name: "Brute Force (Shift Elements)"
    approach: "When a duplicate is found, shift all remaining elements left by one"

    code_python: |
      def remove_duplicate_spells_brute(nums):
          i = 0
          length = len(nums)
          while i < length - 1:
              if nums[i] == nums[i + 1]:
                  for j in range(i + 1, length - 1):
                      nums[j] = nums[j + 1]
                  length -= 1
              else:
                  i += 1
          return length

    complexity:
      time: "O(n^2)"
      space: "O(1)"

    when_to_use: "Never — strictly worse than Two Pointers"
    teaching_value: "Shows WHY Two Pointers is an optimization — avoids repeated shifting"

# Approach explanation
approach_explanation:
  core_insight: |
    Because the scroll is sorted, duplicates are always adjacent. A slow pointer
    (inking quill) holds the position of the last confirmed unique spell. A fast
    pointer (reading quill) scans every entry. When the reading quill finds a
    value different from the inking quill's current spell, the inking quill
    advances and the new spell is copied there. This partitions the array into
    a clean prefix of unique values and a tail of leftover duplicates.

  step_by_step:
    - step: 1
      action: "Initialize slow = 0 (first spell is always unique)"
      why: "The first entry on any sorted scroll has no predecessor — it is trivially unique."

    - step: 2
      action: "Loop fast from 1 to n-1, visiting every entry"
      why: "The reading quill must inspect every parchment entry to find all unique spells."

    - step: 3
      action: "Compare nums[fast] to nums[slow]"
      cases:
        - "nums[fast] == nums[slow]: Duplicate — skip it, advance fast only."
        - "nums[fast] != nums[slow]: New spell — advance slow, copy the spell."

    - step: 4
      action: "Return slow + 1"
      why: "slow is the index of the last unique spell (0-based). Count = index + 1."

  visual_metaphor: |
    Imagine two quills hovering over a long spell scroll. The inking quill
    sits on the last confirmed unique spell. The reading quill flies down
    the scroll, entry by entry. When the reading quill spots a new spell
    (different from what the inking quill sits on), the inking quill hops
    forward one space and the reading quill dictates the new spell to be
    inked there. By the time the reading quill reaches the end, the front
    of the scroll contains a clean, duplicate-free catalog.

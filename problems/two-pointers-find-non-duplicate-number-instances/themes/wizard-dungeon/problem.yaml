  basic-example: "Scroll with mixed duplicates — four unique spells emerge from seven entries"
  two-unique-from-duplicates: "Three copies of one spell and one unique — two distinct power levels"
  all-same: "Every entry is the same incantation — only one unique spell"
  already-unique: "A perfectly cataloged scroll — no duplicates to remove"
  two-elements-same: "Two copies of the same spell — one remains"
  two-elements-different: "Two different spells — both are unique"
